{% extends 'base.html' %}
{% block content %}
<div class="form-container">
  <h2>Inscription</h2>
  <form method="post">
    <h3>Informations de connexion</h3>
    <label>Identifiant :</label><input name="username" required>
    <label>Mot de passe :</label><input type="password" name="password" required>
    <hr>
    <h3>Informations personnelles</h3>
    <label>Nom :</label><input name="nom" required>
    <label>Prénom :</label><input name="prenom" required>
    <label>Date de naissance :</label><input name="date_naissance" placeholder="YYYY-MM-DD">
    <label>Adresse :</label><input name="adresse">
    <label>Profession :</label><input name="profession">
    <label>Téléphone fixe :</label><input name="phone_fixe">
    <label>Téléphone portable :</label><input name="phone_portable">
    <label>Email :</label><input type="email" name="email">
    <button>S'inscrire</button>
  </form>
  <a class="button-link" href="{{ url_for('login') }}">Déjà un compte ?</a> <!--Possibilité de se connecter directement-->
</div>
{% endblock %}
