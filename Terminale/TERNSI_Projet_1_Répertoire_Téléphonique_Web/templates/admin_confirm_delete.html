{% extends 'base.html' %}
{% block content %}
<div class="form-container">
  <h2>Confirmation de suppression</h2>
  <p>Voulez-vous vraiment supprimer la fiche de <strong>{{ person['nom'] }} {{ person['prenom'] }}</strong> ?</p>
  <form method="post" action="{{ url_for('admin_delete', id_contact=person['id_contact']) }}">
    <button type="submit">Oui, supprimer</button>
    <a class="button-link" href="{{ url_for('admin_dashboard') }}">Non, annuler</a>
  </form>
</div>
{% endblock %}
